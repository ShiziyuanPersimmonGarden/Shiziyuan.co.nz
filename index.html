<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shiziyuan Persimmon Garden | Helensville NZ</title>

  <meta name="description" content="Shiziyuan Persimmon Garden in Helensville NZ. Seasonal persimmon picking, family-friendly farm visits, animals, tours and nature experiences." />
  <meta name="robots" content="index, follow" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #f9fafb;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --primary: #16a34a;
      --accent: #22c55e;
    }

    [data-theme="dark"] {
      --bg: #020617;
      --card: #020617;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --primary: #4ade80;
      --accent: #22c55e;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    header {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: rgba(2,6,23,.75);
      backdrop-filter: blur(14px);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 2rem;
    }

    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      color: white;
      margin: 0;
    }

    nav {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    nav a {
      color: white;
      text-decoration: none;
      font-weight: 600;
      font-size: .95rem;
    }

    .hero {
      min-height: 90vh;
      background: linear-gradient(rgba(0,0,0,.55), rgba(0,0,0,.55)),
        url('orchard.jpg') center/cover no-repeat;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 3rem 1.5rem;
      color: white;
    }

    .hero h2 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.2rem, 5vw, 3.5rem);
    }

    .hero p {
      max-width: 720px;
      font-size: 1.25rem;
    }

    .announcement {
      margin-top: 1rem;
      display: inline-block;
      padding: .6rem 1.4rem;
      border-radius: 999px;
      background: var(--accent);
      color: white;
      font-weight: 700;
      font-size: .95rem;
    }

    .cta {
      margin-top: 2rem;
      padding: .9rem 2.2rem;
      border-radius: 999px;
      border: none;
      background: var(--accent);
      cursor: pointer;
      font-weight: 700;
    }

    section {
      max-width: 1200px;
      margin: 5rem auto;
      padding: 0 1.5rem;
    }

    .section-box {
      background: var(--card);
      border-radius: 24px;
      padding: 3rem;
      box-shadow: 0 20px 40px rgba(0,0,0,.08);
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 2rem;
      margin-top: 2rem;
    }

    .info-card {
      background: rgba(22,163,74,.05);
      padding: 1.8rem;
      border-radius: 18px;
    }

    .services {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 2rem;
    }

    .service {
      padding: 2rem;
      border-radius: 20px;
      background: var(--card);
      box-shadow: 0 12px 30px rgba(0,0,0,.1);
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 1rem;
    }

    .gallery img {
      width: 100%;
      height: 240px;
      object-fit: cover;
      border-radius: 18px;
    }

    .contact {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 2rem;
    }

    footer {
      margin-top: 6rem;
      background: #020617;
      color: #94a3b8;
      text-align: center;
      padding: 3rem 1.5rem;
    }
  </style>
</head>
<body>

<header>
  <h1>Shiziyuan Persimmon Garden</h1>
</header>

<section class="hero">
  <div>
    <h2>Seasonal Persimmon Picking in Helensville</h2>
    <p>Open from April 25th each year. A peaceful, family-friendly orchard experience.</p>

    <div class="announcement">
      We're open for picking on the 18th of April 2026
    </div>

    <button class="cta">Plan Your Visit</button>
  </div>
</section>

</body>
</html>
